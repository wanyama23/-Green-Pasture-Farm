{% extends "layout.html" %}
{% block content %}
<div class="container py-4">
  <div class="row g-4">
    <div class="col-md-6">
      <div class="ratio ratio-4x3">
        <img src="{{ url_for('static', filename='images/' ~ (product['image'] if product.get('image') else 'placeholder.jpg')) }}"
             alt="{{ product['title'] }}" class="w-100 h-100 object-cover img-fix">
      </div>
    </div>

    <div class="col-md-6">
      <h2>{{ product['title'] }}</h2>
      <div class="mb-2">
        <strong class="text-success">KES {{ "{:,}".format(product['price']) }}</strong>
        <small class="text-muted ms-2">{{ product.get('unit','') }}</small>
      </div>

      <p class="text-muted">{{ product.get('excerpt','') }}</p>
      <p>{{ product.get('description','') }}</p>

      <div class="mt-3">
        <a href="{{ url_for('order', product_id=product['id']) }}" class="btn btn-order me-2">Order Now</a>
        <a href="{{ url_for('shop') }}" class="btn btn-outline-secondary">Back to Shop</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
