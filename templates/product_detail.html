{% extends "layout.html" %}
{% block content %}
<div class="container py-5">
  <div class="row g-4">
    <div class="col-md-6">
      <img src="{{ url_for('static', filename='images/' ~ (product['image'] or 'placeholder.jpg')) }}" alt="{{ product['title'] }}" class="w-100 object-cover rounded">
    </div>
    <div class="col-md-6">
      <h1>{{ product['title'] }}</h1>
      <p class="text-muted">{{ product['excerpt'] }}</p>
      <p>{{ product['description'] }}</p>
      <h3 class="text-success">KES {{ "{:,}".format(product['price']) }}</h3>
      <p class="text-muted">{{ product['unit'] }}</p>
      <a href="{{ url_for('order', product_id=product['id']) }}" class="btn btn-order btn-lg">Order Now</a>
    </div>
  </div>
</div>
{% endblock %}
