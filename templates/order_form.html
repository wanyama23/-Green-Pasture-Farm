<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Place Order</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; padding: 2rem; max-width: 900px; margin: auto; }
    .card { margin-top: 1rem; }
    .hint { color:#6c757d; font-size:.95rem; }
  </style>
</head>
<body>
  <h1 class="mb-3">Place Order</h1>
  <p class="hint">You are ordering product ID <strong>{{ product_id }}</strong>. Fill the form and click <em>Place order</em>.</p>

  <div class="card shadow-sm">
    <div class="card-body">
      <form id="orderForm" novalidate>
        <div class="row g-3">
          <div class="col-md-6">
            <label for="buyer_name" class="form-label">Full name *</label>
            <input id="buyer_name" name="buyer_name" class="form-control" required>
            <div class="invalid-feedback">Please enter your name.</div>
          </div>

          <div class="col-md-6">
            <label for="buyer_phone" class="form-label">Phone *</label>
            <input id="buyer_phone" name="buyer_phone" class="form-control" required>
            <div class="invalid-feedback">Please enter a phone number.</div>
          </div>

          <div class="col-md-6">
            <label for="buyer_email" class="form-label">Email</label>
            <input id="buyer_email" name="buyer_email" type="email" class="form-control">
            <div class="invalid-feedback">Please enter a valid email.</div>
          </div>

          <div class="col-md-3">
            <label for="quantity" class="form-label">Quantity *</label>
            <input id="quantity" name="quantity" type="number" min="1" value="1" class="form-control" required>
            <div class="invalid-feedback">Quantity must be at least 1.</div>
          </div>

          <div class="col-md-12">
            <label for="address" class="form-label">Delivery address</label>
            <input id="address" name="address" class="form-control">
          </div>

          <div class="col-md-12">
            <label for="notes" class="form-label">Notes</label>
            <textarea id="notes" name="notes" rows="3" class="form-control"></textarea>
          </div>

          <div class="col-12 d-flex gap-2">
            <button id="submitBtn" type="submit" class="btn btn-primary">Place order</button>
            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Back to home</a>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Success / Error Modal -->
  <div class="modal fade" id="resultModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="resultModalLabel">Order status</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="resultModalBody"></div>
        <div class="modal-footer">
          <button id="modalCloseBtn" type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 JS bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    (function(){
      const form = document.getElementById('orderForm');
      const submitBtn = document.getElementById('submitBtn');
      const resultModal = new bootstrap.Modal(document.getElementById('resultModal'));
      const resultModalBody = document.getElementById('resultModalBody');

      function validateForm() {
        if (!form.checkValidity()) {
          form.classList.add('was-validated');
          return false;
        }
        return true;
      }

      form.addEventListener('submit', async function(e){
        e.preventDefault();
        if (!validateForm()) return;

        submitBtn.disabled = true;
        submitBtn.innerHTML = 'Placing order...';

        const productId = {{ product_id }};
        const url = form.action || `/order/${productId}`;

        const payload = {
          buyer_name: form.buyer_name.value.trim(),
          buyer_phone: form.buyer_phone.value.trim(),
          buyer_email: form.buyer_email.value.trim(),
          quantity: Number(form.quantity.value) || 1,
          address: form.address.value.trim(),
          notes: form.notes.value.trim()
        };

        try {
          const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const text = await res.text();
          let json;
          try { json = JSON.parse(text); } catch { json = null; }

          if (res.ok && json && json.success) {
            resultModalBody.innerHTML = `
              <div class="text-success">
                <h5>Order received</h5>
                <p>Your order ID is <strong>${json.order_id}</strong>. Thank you!</p>
                <p class="mb-0">You will be redirected to the homepage shortly.</p>
              </div>
            `;
            resultModal.show();
            setTimeout(() => { window.location.href = "{{ url_for('index') }}"; }, 2000);
          } else {
            const errMsg = (json && json.error) ? json.error : text || 'Server error';
            resultModalBody.innerHTML = `
              <div class="text-danger">
                <h5>Could not place order</h5>
                <p>${errMsg}</p>
              </div>
            `;
            resultModal.show();
          }
        } catch (err) {
          resultModalBody.innerHTML = `
            <div class="text-danger">
              <h5>Network error</h5>
              <p>${err.message}</p>
            </div>
          `;
          resultModal.show();
        } finally {
          submitBtn.disabled = false;
          submitBtn.innerHTML = 'Place order';
        }
      });
    })();
  </script>
</body>
</html>
